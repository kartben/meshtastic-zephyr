name: Build

on:
  push:
    branches:
    - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  build:
    name: Build sample
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-24.04, macos-14, windows-2025]
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: meshtastic-zephyr
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: meshtastic-zephyr
          toolchains: arm-zephyr-eabi:xtensa-espressif_esp32s3_zephyr-elf
          ccache-cache-key: ${{ matrix.os }}

      - name: Run protocol tests
        working-directory: meshtastic-zephyr
        shell: bash
        run: |
          west twister -T tests/protocol -p native_sim/native/64 -v --inline-logs

      - name: Build sample
        working-directory: meshtastic-zephyr
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          west twister -T samples/meshtastic -v --inline-logs --integration $EXTRA_TWISTER_FLAGS
