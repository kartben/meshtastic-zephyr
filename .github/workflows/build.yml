name: Build

on:
  push:
    branches:
    - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  build:
    name: Build sample
    outputs:
      coverage_report: ${{ steps.coverage.outputs.report }}
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-24.04, macos-14, windows-2025]
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: meshtastic-zephyr
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: meshtastic-zephyr
          toolchains: arm-zephyr-eabi:xtensa-espressif_esp32s3_zephyr-elf
          ccache-cache-key: ${{ matrix.os }}

      - name: Run protocol tests
        id: protocol_tests
        working-directory: meshtastic-zephyr
        shell: bash
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          TWISTER_ARGS="-T tests/protocol -p native_sim/native/64 -v --inline-logs"
          if [ "${{ runner.os }}" = "Linux" ]; then
            west twister ${TWISTER_ARGS} \
              --coverage --coverage-tool gcovr --coverage-basedir .
          else
            west twister ${TWISTER_ARGS}
          fi

      - name: Generate protocol coverage report
        id: coverage
        if: always() && runner.os == 'Linux'
        working-directory: meshtastic-zephyr
        shell: bash
        run: |
          if [ -f twister-out/coverage.json ]; then
            TRACE_ARGS=(--add-tracefile twister-out/coverage.json)
            if [ -f twister-out/ztest.json ]; then
              TRACE_ARGS+=(--add-tracefile twister-out/ztest.json)
            fi
            gcovr -r . -v --merge-mode-functions=separate \
              --gcov-object-directory twister-out \
              "${TRACE_ARGS[@]}" \
              --markdown coverage-report.md \
              --html coverage-html/ --html-details
          else
            printf '%s\n\n%s\n' '## Protocol test coverage' \
              '_Coverage data not available._' > coverage-report.md
          fi

          {
            echo 'report<<EOF'
            cat coverage-report.md
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

          cat coverage-report.md >> "${GITHUB_STEP_SUMMARY}"
          if [ -d coverage-html ]; then
            {
              echo ''
              echo 'A detailed HTML coverage report is available in the **protocol-coverage-html** workflow artifact.'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload coverage HTML report
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: protocol-coverage-html
          path: meshtastic-zephyr/coverage-html/
          if-no-files-found: ignore

      - name: Build sample
        working-directory: meshtastic-zephyr
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_TWISTER_FLAGS="--short-build-path -O/tmp/twister-out"
          fi
          west twister -T samples/meshtastic -v --inline-logs --integration $EXTRA_TWISTER_FLAGS
